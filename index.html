<!DOCTYPE html>
<html lang="ko">
<head>

  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;

    /* ─── Right Panel ───────────────────────────────────────────── */

    /* ─── Content Card ──────────────────────────────────────────── */

    /* ─── Buttons ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 22px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.15s, box-shadow 0.15s;
      letter-spacing: -0.2px;
    }

    .btn-primary {

    .btn-success {

    /* ─── Privacy Consent ───────────────────────────────────────── */
    .privacy-box {

    /* ─── Section divider ───────────────────────────────────────── */
    .section-label {

      font-size: 12px;
      font-weight: 700;
      color: #5a4fcf;

      letter-spacing: 0.6px;

    /* ─── Privacy View Document ─────────────────────────────────── */
    .privacy-view-doc {

      font-size: 14px;

    .privacy-view-list li {

    /* ─── Empty / Placeholder State ─────────────────────────────── */

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      #left-panel { min-height: auto; max-height: 220px; }
      body { overflow: auto; height: auto; }
    }

    @media (max-width: 600px) {
      #right-panel { padding: 16px 12px; }
      .form-table .label-cell,
      .view-table .view-label { width: 100px; min-width: 100px; font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- Main App Grid -->
<div id="app">

  <!-- ═══ LEFT PANEL ═══════════════════════════════════════════ -->
  <nav id="left-panel" aria-label="주 메뉴">

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://mcshhvttsvfurrkpcbdf.supabase.co';

/* ══════════════════════════════════════════════════════════════
   State
══════════════════════════════════════════════════════════════ */
let currentMode = null; // 'view' | 'form' | 'edit'
let currentData = null;
let imageBase64 = null;

/* ══════════════════════════════════════════════════════════════
   Dropdown Data
══════════════════════════════════════════════════════════════ */
const NATIONALITIES = [
  '대한민국','미국','중국','일본','영국','독일','프랑스',
  '캐나다','호주','싱가포르','인도','태국','베트남','기타'
];

const GENDERS = ['남','여'];
const INSTRUCTOR_TYPES = ['교수','저명인사','일반강사'];

/* ══════════════════════════════════════════════════════════════
   Utility: Spinner
══════════════════════════════════════════════════════════════ */
function showSpinner() {
  document.getElementById('spinner-overlay').classList.add('active');
}
function hideSpinner() {
  document.getElementById('spinner-overlay').classList.remove('active');
}

/* ══════════════════════════════════════════════════════════════
   Utility: Toast
══════════════════════════════════════════════════════════════ */
function showToast(message, type = 'success', duration = 3500) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  toast.setAttribute('role', 'alert');
  container.appendChild(toast);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => toast.classList.add('show'));
  });

  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

/* ══════════════════════════════════════════════════════════════
   Utility: Escape HTML
══════════════════════════════════════════════════════════════ */
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════════════════════════════
   Utility: Select Options HTML
══════════════════════════════════════════════════════════════ */
function buildOptions(list, selected) {
  return list.map(v =>
    `<option value="${esc(v)}"${selected === v ? ' selected' : ''}>${esc(v)}</option>`
  ).join('');
}

/* ══════════════════════════════════════════════════════════════
   Left Menu: Accordion
══════════════════════════════════════════════════════════════ */
const navGroupToggle = document.getElementById('nav-group-toggle');
const navGroupBody   = document.getElementById('nav-group-body');

function toggleAccordion() {
  const collapsed = navGroupBody.classList.toggle('collapsed');
  navGroupToggle.classList.toggle('collapsed', collapsed);
  navGroupToggle.setAttribute('aria-expanded', String(!collapsed));
}

navGroupToggle.addEventListener('click', toggleAccordion);
navGroupToggle.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleAccordion(); }
});

/* ══════════════════════════════════════════════════════════════
   Left Menu: Navigation
══════════════════════════════════════════════════════════════ */
function handleNavRegister() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active');
    el.removeAttribute('aria-current');
  });
  const item = document.getElementById('nav-register');
  item.classList.add('active');
  item.setAttribute('aria-current', 'page');
  loadInstructor();
}

document.getElementById('nav-register').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleNavRegister(); }
});

/* ══════════════════════════════════════════════════════════════
   DB: Load Instructor
══════════════════════════════════════════════════════════════ */
async function loadInstructor() {
  showSpinner();
  try {
    const id = localStorage.getItem('instructor_id');

    // 1) localStorage에 ID가 있으면 해당 레코드 우선 조회
    if (id) {
      const { data, error } = await db
        .from('instructors')
        .select('*')
        .eq('id', id)
        .single();

      if (!error && data) {
        showView(data);
        return;
      }
      // ID가 있어도 DB에 없으면 localStorage 초기화 후 전체 재조회
      localStorage.removeItem('instructor_id');
    }

    // 2) localStorage에 ID가 없거나 조회 실패 시 DB에서 최신 레코드 조회
    const { data: latest, error: latestError } = await db
      .from('instructors')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(1)
      .maybeSingle();

    if (!latestError && latest) {
      localStorage.setItem('instructor_id', latest.id);
      showView(latest);
    } else {
      showForm(null);
    }
  } catch (err) {
    showToast('데이터 로드 중 오류가 발생했습니다.', 'error');
    showForm(null);
  } finally {
    hideSpinner();
  }
}

/* ══════════════════════════════════════════════════════════════
   DB: Save Instructor
══════════════════════════════════════════════════════════════ */
async function saveInstructor(formData) {
  const id = localStorage.getItem('instructor_id');
  showSpinner();
  try {
    let result;
    if (id) {
      result = await db
        .from('instructors')
        .update(formData)
        .eq('id', id)
        .select()
        .single();
    } else {
      result = await db
        .from('instructors')
        .insert(formData)
        .select()
        .single();
    }

    if (result.error) {
      throw result.error;
    }

    if (result.data) {
      localStorage.setItem('instructor_id', result.data.id);
      showToast('강사 정보가 성공적으로 저장되었습니다.', 'success');
      showView(result.data);
    }
  } catch (err) {
    console.error('Save error:', err);
    showToast('저장 중 오류가 발생했습니다: ' + (err.message || '알 수 없는 오류'), 'error');
  } finally {
    hideSpinner();
  }
}

      this.value = '';
      return;
    }

      imageBase64 = e.target.result;
      const preview = document.getElementById('image-preview');
      const placeholder = document.getElementById('image-placeholder');
      preview.src = imageBase64;
      preview.classList.add('visible');
      if (placeholder) placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // Form submit
  document.getElementById('instructor-form').addEventListener('submit', handleFormSubmit);

/* ══════════════════════════════════════════════════════════════
   Form Submit Handler
══════════════════════════════════════════════════════════════ */
async function handleFormSubmit(e) {
  e.preventDefault();

  const nameVal = document.getElementById('instructor_name').value.trim();
  if (!nameVal) {
    showToast('강사명은 필수 입력 항목입니다.', 'warning');
    document.getElementById('instructor_name').focus();
    return;
  }

  const consentCheck = document.getElementById('privacy_consent_check');
  if (!consentCheck.checked) {
    showToast('개인정보 수집 및 이용 동의는 필수입니다.', 'warning');
    consentCheck.focus();
    return;
  }

  const formData = {
    instructor_name:    document.getElementById('instructor_name').value.trim(),
    instructor_name_en: document.getElementById('instructor_name_en').value.trim(),
    nationality:        document.getElementById('nationality').value,
    gender:             document.getElementById('gender').value,
    organization:       document.getElementById('organization').value.trim(),
    department:         document.getElementById('department').value.trim(),
    position:           document.getElementById('position').value.trim(),
    birth_date:         document.getElementById('birth_date').value || null,
    company_address:    document.getElementById('company_address').value.trim(),
    homepage:           document.getElementById('homepage').value.trim(),
    email:              document.getElementById('email').value.trim(),
    company_phone:      document.getElementById('company_phone').value.trim(),
    instructor_type:    document.getElementById('instructor_type').value,
    mobile_phone:       document.getElementById('mobile_phone').value.trim(),
    education:          document.getElementById('education').value.trim(),
    major:              document.getElementById('major').value.trim(),
    career:             document.getElementById('career').value.trim(),
    expertise:          document.getElementById('expertise').value.trim(),
    lecture_field:      document.getElementById('lecture_field').value.trim(),
    profile_image:      imageBase64 || null,
    privacy_consent:    consentCheck.checked ? 'Y' : 'N',
  };

  await saveInstructor(formData);
}
